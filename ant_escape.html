<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>蟻の大脱走 ∞</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0500;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
#wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid #4a2e0a;outline:none}
canvas{display:block}
#hud{position:absolute;top:0;left:0;right:0;height:36px;display:flex;justify-content:space-between;align-items:center;padding:0 14px;background:rgba(10,5,0,0.95);font-size:13px;font-weight:500;color:#e8c87a;pointer-events:none;z-index:5}
#minimap{position:absolute;bottom:8px;right:8px;z-index:5;pointer-events:none;border:0.5px solid rgba(200,160,60,0.4);border-radius:4px}
#msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,5,0,0.96);z-index:10;gap:12px}
#msg h2{font-size:26px;font-weight:600;color:#f0d090}
#msg .sub{font-size:13px;color:#c8a060;text-align:center;line-height:2}
#msg .res{font-size:15px;color:#f0d090;background:rgba(200,160,60,0.12);padding:8px 20px;border-radius:8px;border:0.5px solid rgba(200,160,60,0.3)}
#msg button{font-size:14px;padding:10px 30px;border:1px solid #c8a060;border-radius:8px;background:transparent;cursor:pointer;color:#f0d090;margin-top:4px}
#msg button:hover{background:rgba(200,160,60,0.15)}
</style>
</head>
<body>
<div id="wrap" tabindex="0">
<canvas id="cv"></canvas>
<div id="hud">
  <span>🐜 スコア: <span id="sc">0</span></span>
  <span>⏱ 生存: <span id="tm">0</span>秒</span>
  <span>🔑 鍵: <span id="kk">0</span>/3</span>
  <span>⚡ 速度: <span id="sp">x1.0</span></span>
</div>
<canvas id="minimap" width="110" height="73"></canvas>
<div id="msg">
  <h2>🐜 蟻の大脱走 ∞</h2>
  <div class="sub">
    家主から逃げながら食べ物を集めろ！<br>
    🔑 鍵を3つ集めると脱出口 EXIT が開く<br>
    ⚡ 電気トラップは点滅中のみ危険！<br>
    🌀 紫の渦はテレポーター<br>
    矢印キー / WASD で移動
  </div>
  <button id="btn">スタート</button>
</div>
</div>
<script>
const wrap=document.getElementById('wrap');
const cv=document.getElementById('cv');
const mc=document.getElementById('minimap');
const ctx=cv.getContext('2d');
const mctx=mc.getContext('2d');
const scEl=document.getElementById('sc');
const tmEl=document.getElementById('tm');
const kkEl=document.getElementById('kk');
const spEl=document.getElementById('sp');
const msgEl=document.getElementById('msg');

const CW=720,CH=500,HUD=36;
cv.width=CW;cv.height=CH;
wrap.style.width=CW+'px';

const WORLD_W=1440,WORLD_H=960;
const TS=32;
const GW=Math.ceil(WORLD_W/TS); // 45
const GH=Math.ceil(WORLD_H/TS); // 30

const ROOMS=[
  {name:'リビング',  x:1, y:1, w:12,h:10,col:'#1e140a'},
  {name:'キッチン',  x:15,y:1, w:10,h:8, col:'#0a1a0a'},
  {name:'寝室',     x:27,y:1, w:10,h:8, col:'#0a0e1e'},
  {name:'バスルーム',x:37,y:1, w:7, h:8, col:'#1a0a1a'},
  {name:'廊下',     x:1, y:13,w:43,h:4, col:'#141008'},
  {name:'地下室',   x:1, y:19,w:14,h:10,col:'#0d0d0d'},
  {name:'収納室',   x:17,y:19,w:10,h:10,col:'#100808'},
  {name:'庭',      x:29,y:19,w:15,h:10,col:'#081008'},
];

const DOORS=[
  {x:13,y:4,w:1,h:2},{x:13,y:7,w:1,h:2},
  {x:25,y:4,w:1,h:2},{x:25,y:7,w:1,h:2},
  {x:35,y:4,w:1,h:2},{x:35,y:7,w:1,h:2},
  {x:4, y:11,w:2,h:2},{x:10,y:11,w:2,h:2},
  {x:18,y:9, w:2,h:2},{x:22,y:9, w:2,h:2},
  {x:30,y:9, w:2,h:2},{x:34,y:9, w:2,h:2},
  {x:4, y:17,w:2,h:2},{x:12,y:17,w:2,h:2},
  {x:20,y:17,w:2,h:2},{x:26,y:17,w:2,h:2},
  {x:32,y:17,w:2,h:2},{x:38,y:17,w:2,h:2},
];

const EXIT_RECT={x:43,y:20,w:1,h:4};

const FURNI=[
  {x:2,y:2,w:4,h:1.5},{x:2,y:4,w:2,h:2},{x:7,y:2,w:3,h:2},{x:7,y:5,w:2,h:3},
  {x:16,y:2,w:5,h:1},{x:21,y:2,w:3,h:1.5},{x:17,y:4,w:2,h:2},{x:20,y:4,w:3,h:3},
  {x:28,y:2,w:4,h:3},{x:33,y:2,w:2,h:2},{x:28,y:6,w:2,h:2},{x:32,y:5,w:3,h:3},
  {x:38,y:2,w:2.5,h:2},{x:41,y:2,w:2,h:2},{x:38,y:5,w:3,h:2},
  {x:2,y:20,w:3,h:3},{x:7,y:20,w:2,h:4},{x:10,y:23,w:4,h:3},{x:2,y:25,w:5,h:2},
  {x:18,y:20,w:2,h:5},{x:21,y:20,w:4,h:2},{x:18,y:26,w:7,h:2},{x:22,y:22,w:3,h:4},
];

const TRAPS_DEFS=[
  {x:6,y:13,period:2.5},{x:14,y:14,period:2},{x:22,y:13,period:3},
  {x:30,y:14,period:2},{x:38,y:13,period:2.8},
  {x:8,y:21,period:3},{x:5,y:26,period:2},{x:19,y:24,period:2},
  {x:33,y:22,period:1.8},{x:38,y:26,period:2.5},
];

const TELE_DEFS=[
  {ax:11,ay:8, bx:3, by:21},
  {ax:24,ay:6, bx:20,by:25},
  {ax:31,ay:4, bx:33,by:21},
];

// Build grid
const GMAP=new Uint8Array(GW*GH);
GMAP.fill(1);
function carve(x,y,w,h){for(let r=y;r<y+h;r++)for(let c=x;c<x+w;c++)if(c>=0&&c<GW&&r>=0&&r<GH)GMAP[r*GW+c]=0;}
for(const r of ROOMS)carve(r.x,r.y,r.w,r.h);
for(const d of DOORS)carve(d.x,d.y,d.w,d.h);
carve(EXIT_RECT.x,EXIT_RECT.y,EXIT_RECT.w,EXIT_RECT.h);
for(const f of FURNI){
  const c0=Math.floor(f.x),r0=Math.floor(f.y),c1=Math.ceil(f.x+f.w),r1=Math.ceil(f.y+f.h);
  for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++)if(c>=0&&c<GW&&r>=0&&r<GH&&GMAP[r*GW+c]===0)GMAP[r*GW+c]=2;
}
for(const d of DOORS)carve(d.x,d.y,d.w,d.h);
carve(EXIT_RECT.x,EXIT_RECT.y,EXIT_RECT.w,EXIT_RECT.h);

function gAt(c,r){if(c<0||c>=GW||r<0||r>=GH)return 1;return GMAP[r*GW+c];}

function aStar(sx,sy,tx,ty,passFurni){
  const sc2=Math.max(0,Math.min(GW-1,Math.round(sx/TS)));
  const sr2=Math.max(0,Math.min(GH-1,Math.round(sy/TS)));
  const tc2=Math.max(0,Math.min(GW-1,Math.round(tx/TS)));
  const tr2=Math.max(0,Math.min(GH-1,Math.round(ty/TS)));
  if(sc2===tc2&&sr2===tr2)return[];
  const open=[{c:sc2,r:sr2,g:0,f:Math.abs(sc2-tc2)+Math.abs(sr2-tr2),p:null}];
  const vis=new Uint8Array(GW*GH);
  const D=[[1,0],[-1,0],[0,1],[0,-1]];
  let it=0;
  while(open.length&&it++<800){
    let bi=0;for(let i=1;i<open.length;i++)if(open[i].f<open[bi].f)bi=i;
    const cur=open.splice(bi,1)[0];
    const idx=cur.r*GW+cur.c;
    if(vis[idx])continue;vis[idx]=1;
    if(cur.c===tc2&&cur.r===tr2){
      const path=[];let n=cur;
      while(n.p){path.unshift({x:(n.c+0.5)*TS,y:(n.r+0.5)*TS});n=n.p;}
      return path;
    }
    for(const[dc,dr2] of D){
      const nc=cur.c+dc,nr2=cur.r+dr2;
      if(nc<0||nc>=GW||nr2<0||nr2>=GH||vis[nr2*GW+nc])continue;
      const v=GMAP[nr2*GW+nc];
      if(v===1)continue;
      if(!passFurni&&v===2)continue;
      const g=cur.g+1+(v===2?6:0);
      open.push({c:nc,r:nr2,g,f:g+Math.abs(nc-tc2)+Math.abs(nr2-tr2),p:cur});
    }
  }
  return[];
}

function antBlocked(px,py){
  const R=6;
  for(const[ox,oy]of[[-R,-R],[R,-R],[-R,R],[R,R],[0,-R],[0,R],[-R,0],[R,0]]){
    const v=gAt(Math.floor((px+ox)/TS),Math.floor((py+oy)/TS));
    if(v>=1)return true;
  }
  return false;
}
function ownerBlocked(px,py){
  const R=10;
  for(const[ox,oy]of[[-R,-R],[R,-R],[-R,R],[R,R]]){
    if(gAt(Math.floor((px+ox)/TS),Math.floor((py+oy)/TS))===1)return true;
  }
  return false;
}

// State
let ant,owner,foods,traps,teles,keyItems,score,elapsed,speedMult,particles,state,lastTime,legPhase,ownerAnim,collectedKeys,exitOpen,camX,camY;
const pressedKeys={};

wrap.addEventListener('keydown',e=>{
  pressedKeys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
wrap.addEventListener('keyup',e=>{pressedKeys[e.key]=false;});
wrap.addEventListener('click',()=>wrap.focus());
document.getElementById('btn').onclick=startGame;

function startGame(){
  msgEl.style.display='none';
  wrap.focus();
  score=0;elapsed=0;speedMult=1;particles=[];state='play';
  legPhase=0;ownerAnim=0;collectedKeys=0;exitOpen=false;camX=0;camY=0;
  ant={x:3.5*TS,y:3.5*TS,angle:0,flash:0,tpCool:0};
  owner={x:40*TS,y:3.5*TS,path:[],ptimer:0};
  traps=TRAPS_DEFS.map(t=>({...t,on:Math.random()<0.5,timer:Math.random()*t.period}));
  teles=TELE_DEFS.map(t=>({...t}));
  keyItems=[
    {x:9.5*TS,y:3.5*TS,collected:false},
    {x:23.5*TS,y:3.5*TS,collected:false},
    {x:5.5*TS,y:22.5*TS,collected:false},
  ];
  foods=[];spawnFoods(14);
  scEl.textContent='0';tmEl.textContent='0';kkEl.textContent='0/3';spEl.textContent='x1.0';
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

const FOOD_TYPES=['bread','apple','sugar'];
const FOOD_PTS={bread:10,apple:25,sugar:5};

function spawnFoods(n){
  let placed=0,tries=0;
  while(placed<n&&tries++<5000){
    const c=1+Math.floor(Math.random()*(GW-2));
    const r=1+Math.floor(Math.random()*(GH-2));
    if(gAt(c,r)!==0)continue;
    const fx=(c+0.5)*TS,fy=(r+0.5)*TS;
    if(Math.hypot(fx-ant.x,fy-ant.y)<80)continue;
    let dup=false;
    for(const f of foods)if(Math.hypot(fx-f.x,fy-f.y)<TS){dup=true;break;}
    if(dup)continue;
    foods.push({x:fx,y:fy,type:FOOD_TYPES[Math.floor(Math.random()*3)],phase:Math.random()*Math.PI*2});
    placed++;
  }
}

function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=30+Math.random()*90;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.8+Math.random()*.4,col,sz:2+Math.random()*3});
  }
}

const ANT_SPD=150,OWN_BASE=85;

function updateCamera(){
  const tx=ant.x-CW/2,ty=ant.y-HUD-(CH-HUD)/2;
  camX+=(tx-camX)*0.12;
  camY+=(ty-camY)*0.12;
  camX=Math.max(0,Math.min(WORLD_W-CW,camX));
  camY=Math.max(0,Math.min(WORLD_H-(CH-HUD),camY));
}

function updateAnt(dt){
  ant.flash=Math.max(0,ant.flash-dt);
  ant.tpCool=Math.max(0,ant.tpCool-dt);
  let dx=0,dy=0;
  if(pressedKeys['ArrowLeft']||pressedKeys['a']||pressedKeys['A'])dx-=1;
  if(pressedKeys['ArrowRight']||pressedKeys['d']||pressedKeys['D'])dx+=1;
  if(pressedKeys['ArrowUp']||pressedKeys['w']||pressedKeys['W'])dy-=1;
  if(pressedKeys['ArrowDown']||pressedKeys['s']||pressedKeys['S'])dy+=1;
  if(dx||dy){
    legPhase+=dt*12;
    const len=Math.hypot(dx,dy);dx/=len;dy/=len;
    ant.angle=Math.atan2(dy,dx)-Math.PI/2;
    const mv=ANT_SPD*dt;
    const nx=ant.x+dx*mv,ny=ant.y+dy*mv;
    if(!antBlocked(nx,ant.y))ant.x=nx;
    else if(!antBlocked(ant.x+dx*mv*0.3,ant.y))ant.x+=dx*mv*0.3;
    if(!antBlocked(ant.x,ny))ant.y=ny;
    else if(!antBlocked(ant.x,ant.y+dy*mv*0.3))ant.y+=dy*mv*0.3;
  }
  ant.x=Math.max(TS,Math.min(WORLD_W-TS,ant.x));
  ant.y=Math.max(TS,Math.min(WORLD_H-TS,ant.y));
}

function updateOwner(dt){
  ownerAnim+=dt*4;
  owner.ptimer-=dt;
  if(owner.ptimer<=0||!owner.path.length){
    owner.path=aStar(owner.x,owner.y,ant.x,ant.y,true);
    owner.ptimer=Math.max(0.12,0.38/speedMult);
  }
  if(owner.path.length){
    const tgt=owner.path[0];
    const dx=tgt.x-owner.x,dy=tgt.y-owner.y,d=Math.hypot(dx,dy);
    if(d<4){owner.path.shift();return;}
    const mv=OWN_BASE*speedMult*dt;
    const nx=owner.x+dx/d*mv,ny=owner.y+dy/d*mv;
    if(!ownerBlocked(nx,ny)){owner.x=nx;owner.y=ny;}
    else if(!ownerBlocked(nx,owner.y)){owner.x=nx;}
    else if(!ownerBlocked(owner.x,ny)){owner.y=ny;}
  }
}

function updateTraps(dt){
  for(const t of traps){
    t.timer-=dt;
    if(t.timer<=0){t.on=!t.on;t.timer=t.period*(0.7+Math.random()*0.6);}
    if(t.on){
      const tx=(t.x+0.5)*TS,ty=(t.y+0.5)*TS;
      if(Math.hypot(ant.x-tx,ant.y-ty)<15)gameOver('⚡ 電気トラップに触れた！');
    }
  }
}

function checkTeleporters(){
  if(ant.tpCool>0)return;
  for(const tp of teles){
    const ax=(tp.ax+0.5)*TS,ay=(tp.ay+0.5)*TS;
    const bx=(tp.bx+0.5)*TS,by=(tp.by+0.5)*TS;
    if(Math.hypot(ant.x-ax,ant.y-ay)<18){
      burst(ant.x,ant.y,'#a060ff',10);
      ant.x=bx;ant.y=by;burst(bx,by,'#a060ff',10);ant.tpCool=1.5;return;
    }
    if(Math.hypot(ant.x-bx,ant.y-by)<18){
      burst(ant.x,ant.y,'#a060ff',10);
      ant.x=ax;ant.y=ay;burst(ax,ay,'#a060ff',10);ant.tpCool=1.5;return;
    }
  }
}

function checkKeys(){
  for(const k of keyItems){
    if(!k.collected&&Math.hypot(ant.x-k.x,ant.y-k.y)<18){
      k.collected=true;collectedKeys++;
      kkEl.textContent=collectedKeys+'/3';
      burst(k.x,k.y,'#ffdd00',14);score+=50;scEl.textContent=score;
      if(collectedKeys>=3){exitOpen=true;burst((EXIT_RECT.x+0.5)*TS,(EXIT_RECT.y+2)*TS,'#00ff80',20);}
    }
  }
}

function checkFoods(){
  for(let i=foods.length-1;i>=0;i--){
    if(Math.hypot(ant.x-foods[i].x,ant.y-foods[i].y)<14){
      score+=FOOD_PTS[foods[i].type]||10;scEl.textContent=score;
      const col=foods[i].type==='apple'?'#ff6060':foods[i].type==='bread'?'#e8a040':'#ffee60';
      burst(foods[i].x,foods[i].y,col,6);
      foods.splice(i,1);
      setTimeout(()=>{if(state==='play')spawnFoods(1);},600);
    }
  }
}

function checkExit(){
  if(!exitOpen)return;
  const ex=(EXIT_RECT.x+0.5)*TS,ey=(EXIT_RECT.y+2)*TS;
  if(Math.hypot(ant.x-ex,ant.y-ey)<24){state='win';burst(ant.x,ant.y,'#00ff80',20);setTimeout(()=>showMsg('🎉 脱出成功！','全ての鍵を集めて家を脱出した！'),600);}
}

function checkCatch(){
  if(Math.hypot(ant.x-owner.x,ant.y-owner.y)<22)gameOver('👊 家主に捕まった！');
}

function gameOver(reason){
  if(state!=='play')return;
  state='over';burst(ant.x,ant.y,'#ff3333',18);
  setTimeout(()=>showMsg('ゲームオーバー',reason),800);
}

function showMsg(title,sub){
  let res=msgEl.querySelector('.res');
  if(!res){res=document.createElement('div');res.className='res';msgEl.insertBefore(res,msgEl.querySelector('button'));}
  msgEl.querySelector('h2').textContent=title;
  msgEl.querySelector('.sub').textContent=sub;
  res.textContent='スコア '+score+' 点  ／  生存 '+Math.floor(elapsed)+' 秒  ／  鍵 '+collectedKeys+'/3';
  msgEl.querySelector('button').textContent='もう一度';
  msgEl.style.display='flex';
}

function wx(x){return x-camX;}
function wy(y){return y-camY+HUD;}

function drawWorld(){
  ctx.fillStyle='#0a0500';ctx.fillRect(0,HUD,CW,CH-HUD);
  for(const r of ROOMS){
    ctx.fillStyle=r.col;ctx.fillRect(wx(r.x*TS),wy(r.y*TS),r.w*TS,r.h*TS);
    ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
    for(let c=r.x;c<=r.x+r.w;c++){const sx=wx(c*TS);ctx.beginPath();ctx.moveTo(sx,Math.max(HUD,wy(r.y*TS)));ctx.lineTo(sx,Math.min(CH,wy((r.y+r.h)*TS)));ctx.stroke();}
    for(let rr=r.y;rr<=r.y+r.h;rr++){const sy=wy(rr*TS);ctx.beginPath();ctx.moveTo(Math.max(0,wx(r.x*TS)),sy);ctx.lineTo(Math.min(CW,wx((r.x+r.w)*TS)),sy);ctx.stroke();}
    const lx=wx((r.x+r.w/2)*TS),ly=wy((r.y+r.h/2)*TS);
    if(lx>0&&lx<CW&&ly>HUD&&ly<CH){ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillText(r.name,lx,ly);}
  }
  const c0=Math.max(0,Math.floor(camX/TS)),r0=Math.max(0,Math.floor(camY/TS));
  const c1=Math.min(GW,c0+Math.ceil(CW/TS)+2),r1=Math.min(GH,r0+Math.ceil((CH-HUD)/TS)+2);
  for(let r=r0;r<r1;r++)for(let c=c0;c<c1;c++){
    if(GMAP[r*GW+c]===1){ctx.fillStyle='#4a2e0a';ctx.fillRect(wx(c*TS),wy(r*TS),TS,TS);ctx.strokeStyle='#6a4a18';ctx.lineWidth=0.5;ctx.strokeRect(wx(c*TS),wy(r*TS),TS,TS);}
  }
  for(const d of DOORS){
    const dx=wx(d.x*TS),dy2=wy(d.y*TS);
    ctx.fillStyle='#8a5020';ctx.fillRect(dx,dy2,d.w*TS,d.h*TS);
    ctx.strokeStyle='#c07030';ctx.lineWidth=1;ctx.strokeRect(dx,dy2,d.w*TS,d.h*TS);
  }
  const ex=wx(EXIT_RECT.x*TS),ey=wy(EXIT_RECT.y*TS),ew=EXIT_RECT.w*TS,eh=EXIT_RECT.h*TS;
  ctx.fillStyle=exitOpen?'#00aa50':'#334';ctx.fillRect(ex,ey,ew,eh);
  ctx.strokeStyle=exitOpen?'#00ff80':'#558';ctx.lineWidth=2;ctx.strokeRect(ex,ey,ew,eh);
  if(exitOpen){ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillStyle='#fff';ctx.fillText('EXIT',ex+ew/2,ey+eh/2+4);}
}

function drawFurni(){
  for(const f of FURNI){
    const fx=wx(f.x*TS),fy=wy(f.y*TS),fw=f.w*TS,fh=f.h*TS;
    if(fx+fw<0||fx>CW||fy+fh<HUD||fy>CH)continue;
    ctx.fillStyle='#5c3018';ctx.fillRect(fx,fy,fw,fh);
    ctx.strokeStyle='rgba(200,130,60,0.25)';ctx.lineWidth=1;ctx.strokeRect(fx,fy,fw,fh);
  }
}

function drawTraps(t){
  for(const trap of traps){
    const tx=wx((trap.x+0.5)*TS),ty=wy((trap.y+0.5)*TS);
    if(tx<-30||tx>CW+30||ty<HUD-30||ty>CH+30)continue;
    if(trap.on){
      const g=ctx.createRadialGradient(tx,ty,0,tx,ty,22);
      g.addColorStop(0,'rgba(120,220,255,0.8)');g.addColorStop(1,'rgba(80,160,255,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(tx,ty,22,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#80eeff';ctx.lineWidth=2;
      for(let i=0;i<4;i++){const a=t*4+i*Math.PI/2;ctx.beginPath();ctx.moveTo(tx+Math.cos(a)*5,ty+Math.sin(a)*5);ctx.lineTo(tx+Math.cos(a+.4)*16,ty+Math.sin(a+.4)*16);ctx.stroke();}
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx,ty,4,0,Math.PI*2);ctx.fill();
    }else{ctx.fillStyle='rgba(60,80,100,0.35)';ctx.beginPath();ctx.arc(tx,ty,7,0,Math.PI*2);ctx.fill();}
  }
}

function drawTeles(t){
  for(const tp of teles){
    for(const[px,py]of[[tp.ax,tp.ay],[tp.bx,tp.by]]){
      const cx=wx((px+0.5)*TS),cy=wy((py+0.5)*TS);
      if(cx<-30||cx>CW+30||cy<HUD-30||cy>CH+30)continue;
      const rad=13+Math.sin(t*3)*2;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
      g.addColorStop(0,'rgba(160,90,255,0.85)');g.addColorStop(1,'rgba(100,40,200,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(200,150,255,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();for(let i=0;i<8;i++){const a=t*2+i*Math.PI/4;ctx.moveTo(cx+Math.cos(a)*5,cy+Math.sin(a)*5);ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);}ctx.stroke();
    }
  }
}

function drawKeyItems(t){
  for(const k of keyItems){
    if(k.collected)continue;
    const kx=wx(k.x),ky=wy(k.y)+Math.sin(t*2.5)*3;
    if(kx<-20||kx>CW+20||ky<HUD-20||ky>CH+20)continue;
    ctx.save();ctx.translate(kx,ky);ctx.rotate(Math.sin(t)*0.3);
    ctx.fillStyle='#ffdd00';ctx.strokeStyle='#cc9900';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,-3,6,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillRect(-2.5,1,5,8);ctx.stroke();
    ctx.fillRect(0.5,4,5,2.5);ctx.fillRect(0.5,7.5,5,2.5);
    ctx.restore();
  }
}

function drawFoods(t){
  for(const f of foods){
    const fx=wx(f.x),fy=wy(f.y)+Math.sin(f.phase+t*2)*2;
    if(fx<-20||fx>CW+20||fy<HUD-20||fy>CH+20)continue;
    ctx.save();ctx.translate(fx,fy);
    if(f.type==='bread'){ctx.fillStyle='#d4884a';ctx.beginPath();ctx.ellipse(0,0,7,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f0a060';ctx.beginPath();ctx.ellipse(0,-1.5,4.5,2.5,0,0,Math.PI*2);ctx.fill();}
    else if(f.type==='apple'){ctx.fillStyle='#e83030';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff6060';ctx.beginPath();ctx.arc(-2,-2,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#30a020';ctx.fillRect(-1,-8,2,5);}
    else{ctx.fillStyle='#ffee40';for(let i=-1;i<=1;i++){ctx.beginPath();ctx.arc(i*4,0,3.5,0,Math.PI*2);ctx.fill();}}
    ctx.restore();
  }
}

function drawParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,p.life);ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(wx(p.x),wy(p.y),p.sz||3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawOwner(){
  const x=wx(owner.x),y=wy(owner.y);
  if(x<-50||x>CW+50||y<HUD-50||y>CH+50)return;
  const t=ownerAnim,step=Math.sin(t)*5;
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(0,25,12,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a3a5a';ctx.beginPath();ctx.ellipse(0,5,10,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a2a4a';
  ctx.beginPath();ctx.ellipse(-7+step,20,5,9,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7-step,20,5,9,-0.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3a4a6a';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-10,step*.5);ctx.lineTo(-18,10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,-step*.5);ctx.lineTo(18,10);ctx.stroke();
  ctx.fillStyle='#d4a070';ctx.beginPath();ctx.arc(0,-14,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2010';ctx.beginPath();ctx.arc(0,-22,14,Math.PI,0);ctx.closePath();ctx.fill();
  const eo=Math.max(-3,Math.min(3,(ant.x-owner.x)/40));
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-4+eo*.3,-15,3,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(4+eo*.3,-15,3,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#200';ctx.beginPath();ctx.arc(-4+eo,-15,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(4+eo,-15,2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#500';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-7,-20);ctx.lineTo(-1,-17);ctx.stroke();
  ctx.beginPath();ctx.moveTo(7,-20);ctx.lineTo(1,-17);ctx.stroke();
  ctx.strokeStyle='#903030';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-4,-9);ctx.quadraticCurveTo(0,-7,4,-9);ctx.stroke();
  if(Math.hypot(ant.x-owner.x,ant.y-owner.y)<220){ctx.font='bold 14px system-ui';ctx.fillStyle='#ff4040';ctx.textAlign='center';ctx.fillText('!!',0,-36);}
  ctx.restore();
}

function drawAnt(){
  const x=wx(ant.x),y=wy(ant.y);
  if(ant.flash>0&&Math.floor(ant.flash*10)%2===0)return;
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,9,7,3,0,0,Math.PI*2);ctx.fill();
  ctx.rotate(ant.angle+Math.PI/2);
  ctx.strokeStyle='#5a3000';ctx.lineWidth=1.5;
  for(let i=-1;i<=1;i++){const sw=Math.sin(legPhase+i*1.2)*6,ly=i*4;ctx.beginPath();ctx.moveTo(-3,ly);ctx.lineTo(-9+sw,ly+sw*.4);ctx.stroke();ctx.beginPath();ctx.moveTo(3,ly);ctx.lineTo(9-sw,ly+sw*.4);ctx.stroke();}
  ctx.fillStyle='#1a0800';ctx.beginPath();ctx.ellipse(0,5,4,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2a1000';ctx.beginPath();ctx.ellipse(0,-1,3,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a0800';ctx.beginPath();ctx.ellipse(0,-8,3.5,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,180,80,0.18)';ctx.beginPath();ctx.ellipse(1,4,2,3,0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(-1.5,-9,1.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(1.5,-9,1.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-1.5,-9,.6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(1.5,-9,.6,0,Math.PI*2);ctx.fill();
  const fs=Math.sin(legPhase*.4)*.4;
  ctx.strokeStyle='#7a4000';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-1,-12);ctx.quadraticCurveTo(-7+fs*4,-18,-6+fs*7,-23);ctx.stroke();
  ctx.beginPath();ctx.moveTo(1,-12);ctx.quadraticCurveTo(7-fs*4,-18,6-fs*7,-23);ctx.stroke();
  ctx.restore();
}

function drawDanger(){
  const d=Math.hypot(ant.x-owner.x,ant.y-owner.y);
  if(d<220){ctx.fillStyle=`rgba(255,20,20,${(1-d/220)*0.22})`;ctx.fillRect(0,HUD,CW,CH-HUD);}
}

function drawMinimap(){
  const mw=110,mh=73,sx=mw/WORLD_W,sy=mh/WORLD_H;
  mctx.fillStyle='rgba(8,4,0,0.9)';mctx.fillRect(0,0,mw,mh);
  for(const r of ROOMS){mctx.fillStyle='#2a1a08';mctx.fillRect(r.x*TS*sx,r.y*TS*sy,r.w*TS*sx,r.h*TS*sy);}
  for(const k of keyItems)if(!k.collected){mctx.fillStyle='#ffdd00';mctx.beginPath();mctx.arc(k.x*sx,k.y*sy,2.5,0,Math.PI*2);mctx.fill();}
  if(exitOpen){const ex=(EXIT_RECT.x+0.5)*TS,ey=(EXIT_RECT.y+2)*TS;mctx.fillStyle='#00ff80';mctx.beginPath();mctx.arc(ex*sx,ey*sy,3,0,Math.PI*2);mctx.fill();}
  mctx.fillStyle='#ff3333';mctx.beginPath();mctx.arc(owner.x*sx,owner.y*sy,3,0,Math.PI*2);mctx.fill();
  mctx.fillStyle='#ffaa00';mctx.beginPath();mctx.arc(ant.x*sx,ant.y*sy,3,0,Math.PI*2);mctx.fill();
  mctx.strokeStyle='rgba(255,255,255,0.25)';mctx.lineWidth=0.5;mctx.strokeRect(camX*sx,camY*sy,CW*sx,(CH-HUD)*sy);
}

function drawHUD(){
  ctx.fillStyle='rgba(10,5,0,0.93)';ctx.fillRect(0,0,CW,HUD);
  ctx.strokeStyle='rgba(200,160,60,0.3)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(0,HUD);ctx.lineTo(CW,HUD);ctx.stroke();
}

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  if(state==='play'){
    elapsed+=dt;tmEl.textContent=Math.floor(elapsed);
    speedMult=1+Math.floor(elapsed/15)*0.1+Math.floor(score/150)*0.07;
    spEl.textContent='x'+speedMult.toFixed(1);
    updateAnt(dt);updateOwner(dt);updateTraps(dt);
    checkTeleporters();checkKeys();checkFoods();checkCatch();checkExit();
    updateCamera();
  }
  const t=ts/1000;
  ctx.clearRect(0,0,CW,CH);
  drawWorld();drawFurni();drawTraps(t);drawTeles(t);drawKeyItems(t);drawFoods(t);
  drawDanger();drawParticles(dt);drawOwner();drawAnt();drawHUD();drawMinimap();
  requestAnimationFrame(loop);
}
</script>
